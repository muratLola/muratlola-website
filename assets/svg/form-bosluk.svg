<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Form ve Boşluk editoryal tipografi kapak görseli">
  <rect width="800" height="600" fill="#F7F5F0"/>

  <!-- baskı kolon ızgarası -->
  <g stroke="#121212" stroke-width="1" opacity="0.07">
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- kesilmiş büyük tipografi: FORM (üstten taşan) -->
  <text x="34" y="170" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="210" fill="#121212" letter-spacing="-4">FORM</text>

  <!-- vurgu bloğu (mizanpajı bölen dikdörtgen) -->
  <rect x="60" y="300" width="540" height="120" fill="#FF2D6F" transform="rotate(-2 330 360)"/>

  <!-- konturlu BOŞLUK -->
  <text x="40" y="470" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="118" fill="none" stroke="#121212" stroke-width="2.5" letter-spacing="-2">BOŞLUK</text>

  <!-- küçük destek dikdörtgenler -->
  <rect x="640" y="60" width="100" height="14" fill="#121212"/>
  <rect x="640" y="84" width="60" height="14" fill="#00AEEF"/>

  <!-- alt bilgi -->
  <text x="34" y="556" font-family="'Courier New', monospace" font-weight="700" font-size="16" letter-spacing="2" fill="#5B5B56">SAYI 02 — TİPOGRAFİK EDİTORYAL</text>

  <!-- kayıt işaretleri -->
  <g stroke="#121212" stroke-width="1.5" opacity="0.45">
    <path d="M24,16 v16 M16,24 h16"/>
    <path d="M776,16 v16 M768,24 h16"/>
    <path d="M24,584 v-16 M16,576 h16"/>
    <path d="M776,584 v-16 M768,576 h16"/>
  </g>
  <g opacity="0.9">
    <circle cx="712" cy="556" r="5" fill="#00AEEF"/>
    <circle cx="728" cy="556" r="5" fill="#FF2D6F"/>
    <circle cx="744" cy="556" r="5" fill="#FFD400"/>
    <circle cx="760" cy="556" r="5" fill="#121212"/>
  </g>
</svg>
