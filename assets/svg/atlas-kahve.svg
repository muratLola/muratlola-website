<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Atlas Kahve marka kimliği kapak görseli">
  <defs>
    <pattern id="dots-atlas" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#9C4A1F" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="#F2EAD9"/>
  <rect x="520" y="0" width="280" height="600" fill="url(#dots-atlas)"/>

  <!-- ince izgara çizgileri -->
  <g stroke="#241712" stroke-width="1" opacity="0.08">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
  </g>

  <!-- kahve halkası damgası (analog baskı izlenimi için çift kontur) -->
  <circle cx="560" cy="190" r="175" fill="none" stroke="#9C4A1F" stroke-width="13" opacity="0.9"/>
  <circle cx="568" cy="184" r="175" fill="none" stroke="#C97A3F" stroke-width="4" opacity="0.55"/>

  <!-- fincan silüeti -->
  <g transform="translate(150,330)">
    <path d="M0,40 L150,40 L138,140 Q135,165 95,165 L55,165 Q15,165 12,140 Z" fill="#241712"/>
    <ellipse cx="75" cy="40" rx="76" ry="14" fill="#241712"/>
    <path d="M150,65 Q200,65 200,100 Q200,135 150,128" fill="none" stroke="#241712" stroke-width="12"/>
    <ellipse cx="75" cy="190" rx="100" ry="13" fill="none" stroke="#241712" stroke-width="6" opacity="0.7"/>
  </g>

  <!-- buhar çizgileri -->
  <g stroke="#9C4A1F" stroke-width="5" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M195,300 Q210,275 195,255 Q180,235 195,210"/>
    <path d="M235,300 Q250,275 235,255 Q220,235 235,210"/>
  </g>

  <!-- markalama -->
  <text x="56" y="500" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="84" fill="#241712" letter-spacing="2">ATLAS</text>
  <text x="58" y="535" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" letter-spacing="3" fill="#9C4A1F">KAHVE — KURUMSAL KİMLİK</text>

  <!-- kayıt işaretleri (köşeler) -->
  <g stroke="#241712" stroke-width="1.5" opacity="0.45">
    <path d="M24,16 v16 M16,24 h16"/>
    <path d="M776,16 v16 M768,24 h16"/>
    <path d="M24,584 v-16 M16,576 h16"/>
    <path d="M776,584 v-16 M768,576 h16"/>
  </g>
  <g opacity="0.85">
    <circle cx="40" cy="560" r="5" fill="#00AEEF"/>
    <circle cx="56" cy="560" r="5" fill="#FF2D6F"/>
    <circle cx="72" cy="560" r="5" fill="#FFD400"/>
    <circle cx="88" cy="560" r="5" fill="#241712"/>
  </g>
</svg>
