<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Form ve Boşluk iç sayfa düzeni">
  <rect width="600" height="450" fill="#F7F5F0"/>
  <line x1="300" y1="0" x2="300" y2="450" stroke="#121212" stroke-width="1" opacity="0.15"/>

  <!-- sol sayfa: metin bloğu -->
  <g transform="translate(50,60)">
    <rect width="180" height="18" fill="#121212"/>
    <g fill="#121212" opacity="0.25">
      <rect y="40" width="200" height="6"/>
      <rect y="54" width="200" height="6"/>
      <rect y="68" width="170" height="6"/>
      <rect y="82" width="200" height="6"/>
      <rect y="96" width="190" height="6"/>
      <rect y="110" width="150" height="6"/>
      <rect y="134" width="200" height="6"/>
      <rect y="148" width="200" height="6"/>
      <rect y="162" width="180" height="6"/>
    </g>
  </g>

  <!-- sağ sayfa: büyük alıntı -->
  <g transform="translate(330,90)">
    <rect width="64" height="64" fill="#FF2D6F" opacity="0.9"/>
    <text x="80" y="60" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="78" fill="#121212">02</text>
  </g>
  <text x="330" y="230" font-family="Georgia, serif" font-size="22" fill="#121212" font-style="italic">"Boşluk da</text>
  <text x="330" y="260" font-family="Georgia, serif" font-size="22" fill="#121212" font-style="italic">bir tasarım</text>
  <text x="330" y="290" font-family="Georgia, serif" font-size="22" fill="#121212" font-style="italic">kararıdır."</text>

  <text x="50" y="410" font-family="'Courier New', monospace" font-size="11" letter-spacing="2" fill="#5B5B56">SAYFA 24 — 25</text>
</svg>
