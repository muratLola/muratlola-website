<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davet | Halı Saha PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast" class="toast">Mesaj</div>
    <div class="container" style="max-width:420px;">
        <div id="authScreen">
            <div class="auth-logo">
                <div class="logo-badge">⚽</div>
                <h1>Davet Edildin!</h1>
                <p>Giriş yap veya kayıt ol</p>
            </div>
            <div style="padding:0 20px 30px;">
                <div class="tabs">
                    <div class="tab active" onclick="switchAuthTab('login')">Giriş Yap</div>
                    <div class="tab" onclick="switchAuthTab('register')">Kayıt Ol</div>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="E-Posta">
                    <input type="password" id="loginPassword" placeholder="Şifre">
                    <button onclick="loginUser()">Giriş Yap</button>

                    <div style="text-align:center; margin: 15px 0; color: var(--text-dim); font-size: 12px; position: relative;">
                        <span style="background: var(--bg2); padding: 0 10px; position: relative; z-index: 1;">VEYA</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); z-index: 0;"></div>
                    </div>
                    <button onclick="loginWithGoogle()" style="background:#fff; color:#333; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:10px; padding: 12px; margin-top: 5px;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px; height:20px;">
                        Google ile Devam Et
                    </button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regName" placeholder="Ad Soyad">
                    <select id="regCity"></select>
                    <div class="field-row">
                        <input type="number" id="regAge" placeholder="Yaş">
                        <input type="number" id="regHeight" placeholder="Boy (cm)">
                    </div>
                    <select id="regPosition">
                        <option value="Kaleci">🧤 Kaleci</option>
                        <option value="Defans">🛡️ Defans</option>
                        <option value="Orta Saha">🎯 Orta Saha</option>
                        <option value="Forvet">⚡ Forvet</option>
                    </select>
                    <input type="email" id="regEmail" placeholder="E-Posta">
                    <input type="password" id="regPassword" placeholder="Şifre (Min 6 karakter)">
                    <button onclick="registerUser()">Hesap Oluştur</button>
                </div>
            </div>
        </div>

        <div id="mainApp" style="display:none;">
            <div class="app-header">
                <span class="app-header-logo">⚽ HSP</span>
                <div class="app-header-actions">
                    <span style="color:var(--gold);font-size:13px;font-weight:700;" id="userNameDisplay">—</span>
                    <button class="logout-btn" onclick="logoutUser()">Çıkış</button>
                </div>
            </div>

            <div style="padding:20px;">
                <!-- MATCH INVITE -->
                <div id="matchInviteSection" style="display:none;">
                    <h2 style="text-align:center;margin-bottom:15px;">⚽ Maç Daveti</h2>
                    <div id="displayMatchId"></div>

                    <div id="passwordSection" style="display:none;flex-direction:column;gap:10px;margin-top:15px;">
                        <div style="text-align:center;padding:15px;background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.3);border-radius:12px;">
                            <div style="font-size:28px;margin-bottom:8px;">🔒</div>
                            <h3 style="color:var(--red);">Şifreli Oda</h3>
                            <p style="font-size:13px;color:var(--text-dim);">Katılmak için oda şifresini girin</p>
                        </div>
                        <input type="password" id="roomPassword" placeholder="Oda Şifresi">
                        <button onclick="checkPassword()" class="btn-danger">Şifreyi Doğrula</button>
                    </div>

                    <div id="joinSection" style="display:none;flex-direction:column;gap:10px;margin-top:15px;">
                        <button onclick="requestJoinMatch()">⏳ KATILIM İSTEĞİ GÖNDER</button>
                        <p style="text-align:center;font-size:12px;color:var(--text-dim);">İsteğin kaptana iletilecek. Onaylandığında kadroya alınacaksın.</p>
                    </div>
                </div>

                <!-- CLAN INVITE -->
                <div id="clanInviteSection" style="display:none;text-align:center;">
                    <h2 style="margin-bottom:15px;">🛡️ Kulüp Daveti</h2>
                    <div class="clan-card" style="margin-bottom:20px;">
                        <div style="font-size:11px;letter-spacing:3px;color:var(--text-dim);margin-bottom:8px;">KULÜP ADI</div>
                        <h2 id="displayInvitedClanName" style="margin:0;font-size:26px;">Yükleniyor...</h2>
                    </div>
                    <button onclick="joinClan()" class="btn-danger">🛡️ KULÜBE KATIL</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
